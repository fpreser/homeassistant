- id: '1684684909909'
  alias: Sonnette appuyée
  description: Lance un son sur google home quand qqn sonne à la porte
  triggers:
  - type: turned_on
    device_id: c51528090ce967acd046482cbbd12ab6
    entity_id: binary_sensor.sonnette_visitor
    domain: binary_sensor
    trigger: device
  conditions: []
  actions:
  - action: camera.snapshot
    metadata: {}
    data:
      filename: /config/www/tmp/snapshot-doorbell.jpg
    target:
      entity_id: camera.sonnette_sub
  - data:
      volume_level: 0.5
    target:
      entity_id:
      - media_player.all
    action: media_player.volume_set
  - data:
      enqueue: replace
      media:
        media_content_id: media-source://media_source/local/doorbell.mp3
        media_content_type: music
        metadata: {}
    target:
      device_id:
      - 8c8316ebf4d897840c1debf0bc12c42b
      - edacc47678d6b1905ed52fa1e3cf9c8e
      - 8f2c67d66673ee06f291fff7e8391106
      - 230e667d38b40ebe5627c6a841107b9e
      - 0530124217cd7ebbad60c43579fc3c06
      - bd31a4147ac4c2c2197f4d3069d26882
      - b48e20a5aba2a3f935998c61dcee5e61
      - e93c18a33cdb83f58ad703e88ead008e
    action: media_player.play_media
  - data:
      enqueue: replace
      media:
        media_content_id: media-source://media_source/local/Vecna Clock - Sound -
          Stranger Things ! Notification.mp3
        media_content_type: music
        metadata: {}
    target:
      device_id: c9b7108b55780120c452a2a59e7fc230
    action: media_player.play_media
  - action: notify.mobile_app_iphone_16_pro_de_fabien
    data:
      message: Quelqu'un a sonné à la porte
      title: Qqn a sonné
      data:
        image: /local/tmp/snapshot-doorbell.jpg
        entity_id: camera.sonnette
        actions:
        - action: URI
          title: Open Reolink App
          uri: app://com.mcu.reolink
        - action: URI
          title: View Camera in HA
          uri: /lovelace/cameras
  - if:
    - condition: state
