        - Full
      sequence:
      - service: script.notify_fabien
        data:
          title: UPS
          message: Batterie chargée totalement
    - conditions:
      - condition: trigger
        id:
        - Half
      sequence:
      - service: script.notify_fabien
        data:
          title: UPS
          message: Batterie chargée à {{ states ('sensor.ups_charge_de_la_batterie')
            }} %
    - conditions:
      - condition: trigger
        id:
        - Empty
      sequence:
      - service: script.notify_fabien
