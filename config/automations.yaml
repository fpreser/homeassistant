- id: '1736108052116'
  alias: Presence Toggle
  description: Indique si qqn est à la maison sur base de geolocalisation
  triggers:
  - trigger: numeric_state
    entity_id:
    - sensor.home_distance_la_plus_proche
    below: 5000
    id: Approaching
  - trigger: numeric_state
    entity_id:
    - zone.home
    above: 0
    id: Approaching
  - trigger: state
    entity_id:
    - zone.home
    to: '0'
    id: Leaving
  - trigger: numeric_state
    entity_id:
    - sensor.home_distance_la_plus_proche
    above: 5000
    id: Leaving
  actions:
  - choose:
    - conditions:
      - condition: and
        conditions:
        - condition: trigger
          id:
          - Approaching
        - condition: or
          conditions:
          - condition: state
            entity_id: sensor.home_nearest_direction_of_travel
            state: towards
          - condition: state
            entity_id: sensor.home_nearest_direction_of_travel
            state: arrived
      sequence:
      - action: script.notify_fabien
        data:
          message: Presence
          title: Approaching - Hausse
      - action: input_boolean.turn_on
        data: {}
        target:
          entity_id: input_boolean.presence_toggle
    - conditions:
      - condition: trigger
        id:
        - Leaving
      sequence:
      - action: script.notify_fabien
        data:
          message: Presence
          title: Leaving
      - action: input_boolean.turn_off
        data: {}
        target:
          entity_id: input_boolean.presence_toggle
  mode: single
