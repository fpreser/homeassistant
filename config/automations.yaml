- id: '1768734536410'
  alias: Hall entrée détection avec luminosité
  description: Allume la lumière du hall sur mouvement seulement si sombre, et éteint
    après absence de mouvement + délai
  triggers:
  - entity_id: binary_sensor.hall_entree_detecteur_de_mouvements
    from: 'off'
    to: 'on'
    trigger: state
  conditions:
  - condition: numeric_state
    entity_id: sensor.hall_entree_lumiere
    below: 15
  actions:
  - target:
      entity_id: light.hall_d_entree
    action: light.turn_on
  - wait_for_trigger:
    - entity_id: binary_sensor.hall_entree_detecteur_de_mouvements
      from: 'on'
      to: 'off'
      trigger: state
  - delay:
      hours: 0
      minutes: 0
      seconds: 30
      milliseconds: 0
  - target:
      entity_id: light.hall_d_entree
    action: light.turn_off
  mode: restart
  max_exceeded: silent
