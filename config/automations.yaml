  - platform: numeric_state
    entity_id: sensor.ups_charge_de_la_batterie
    below: 50
    id: Half
  - platform: numeric_state
    entity_id: sensor.ups_charge_de_la_batterie
    below: 10
    id: Empty
  - platform: state
    entity_id:
    - sensor.ups_code_d_etat
    id: PowerFailure
    to: OB DISCHRG
  - platform: state
    entity_id:
    - sensor.ups_code_d_etat
    to: OL CHRG
    id: PowerRestored
    from: OB DISCHRG
  - platform: state
    entity_id:
    - sensor.ups_code_d_etat
    to: OL
    id: Full
    from: OL CHRG
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
