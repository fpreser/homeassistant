    trigger: homeassistant
  conditions: []
  actions:
  - data:
      object_id: my_lights
      name: Mes lumières
      entities: '{{ states.light | rejectattr (''attributes.entity_id'', ''defined'')
        | selectattr (''attributes.friendly_name'', ''defined'') | rejectattr (''attributes.friendly_name'',
        ''search'', ''Binary'') | rejectattr (''attributes.friendly_name'', ''search'',
        ''FGD'') | rejectattr (''attributes.friendly_name'', ''search'', ''awtrix'')
        | rejectattr  (''attributes.friendly_name'', ''search'', ''microwave'') |
        rejectattr (''attributes.friendly_name'', ''search'', ''oven'')   | map (attribute=''entity_id'')
        | join('','') }}'
    action: group.set
  - data:
      object_id: my_climates
      name: Mes Chauffages
      entities: '{{ states.climate |selectattr(''attributes.current_temperature'',
        ''defined'') | selectattr(''attributes.temperature'', ''defined'') | rejectattr(''attributes.friendly_name'',''contains'',''Vitodens'')
        | rejectattr(''attributes.friendly_name'',''contains'',''F.R.I.D.A.Y'') |
        map (attribute=''entity_id'') | join ('','')}}'
    action: group.set
  - data: {}
    target:
      entity_id: button.f_r_i_d_a_y_wake
    action: button.press
  - delay:
      seconds: 15
  - target:
      entity_id: sensor.f_r_i_d_a_y_niveau_de_batterie
    action: homeassistant.update_entity
  mode: single
