- id: '1694459425376'
  alias: Min Max Consommaiton Nette
  description: Stocke le nombre min de kWH en suprlus
  triggers:
  - value_template: '{{ states(''sensor.net_energy'') | float(default=0) < states(''input_number.min_consommation_nette'')
      | float(default=0) }}'
    id: Min
    trigger: template
  - value_template: '{{ states(''sensor.net_energy'') | float(default=0) > states(''input_number.max_consommation_nette'')
      | float(default=0) }}'
    id: Max
    trigger: template
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - Min
      sequence:
      - target:
          entity_id: input_number.min_consommation_nette
        data:
          value: '{{ states(''sensor.net_energy'') | float(default=0) }}'
        action: input_number.set_value
      - target:
          entity_id: input_datetime.min_consommation_nette_timestamp
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        action: input_datetime.set_datetime
    - conditions:
      - condition: trigger
        id:
        - Max
      sequence:
      - target:
          entity_id: input_number.max_consommation_nette
        data:
