- id: '1683564320803'
  alias: Awtrix Availability or Unavailability
  description: Exécute une action quand Awtrix devient indispo ou revient disponible
  trigger:
  - platform: state
    entity_id:
    - light.matrix
    to: unavailable
    id: Unavailable
  - platform: state
    entity_id:
    - light.matrix
    to: 'on'
    id: Available
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: Unavailable
      sequence:
      - service: script.notify_fabien
        data:
          message: Awtrix est devenu indisponible
          title: Awtrix indisponible
  - choose:
    - conditions:
      - condition: trigger
        id: Available
      sequence:
      - service: "{% set entity_ids = expand(states) | selectattr('entity_id', 'match',
          '^input_boolean\\\\.') | selectattr('entity_id', 'search', 'awtrix') | list
          | map(attribute='entity_id') | list %}\n{% for entity_id in entity_ids %}\n
          \ {% set index = loop.index0 %}\n  {% set toggle_service = { 'service':
          'input_boolean.toggle', 'data': { 'entity_id': entity_id } } %}\n  {% set
          delay_service = { 'service': 'delay', 'data': { 'seconds': 2 } } %}\n  -
          service: script.execute\n    data_template:\n      sequence:\n        -
          '{{ toggle_service }}'\n        - '{{ delay_service }}'\n{% endfor %}\n"
      - service: "{% set entity_ids = expand(states) | selectattr('entity_id', 'match',
          '^input_boolean\\\\.') | selectattr('entity_id', 'search', 'awtrix') | list
          | map(attribute='entity_id') | list %}\n{% for entity_id in entity_ids %}\n
          \ {% set index = loop.index0 %}\n  {% set toggle_service = { 'service':
          'input_boolean.toggle', 'data': { 'entity_id': entity_id } } %}\n  {% set
          delay_service = { 'service': 'delay', 'data': { 'seconds': 2 } } %}\n  -
          service: script.execute\n    data_template:\n      sequence:\n        -
          '{{ toggle_service }}'\n        - '{{ delay_service }}'\n{% endfor %}            \n"
  mode: single
