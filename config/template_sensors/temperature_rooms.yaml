#####################################################################
#          T E M P E R A T U R E S   P I E C E S
#####################################################################
#
# Expose les temperatures de chaque piece depuis les thermostats
# Evohome/Honeywell comme des sensors independants.
#
# Source  : attribut current_temperature des entites climate.*
# Integration : Honeywell Home / Resideo (evohome)
#
# Sensors :
#   - Mode systeme Evohome (Auto, Away, DayOff, etc.)
#   - Hall entree, WC bas, Salon, Salle a manger, Cuisine
#   - Hall de nuit, Polyvalent
#   - Ch. Emma, Ch. Louis, Bureau Fabien, Ch. Amis, Salle de bain
#   - Temperature chauffe-eau (Viessmann Vicare)
#
#####################################################################

- sensor:
    - name: "Mode Système Evohome"
      unique_id: honeywell-mode-systeme
      state: >-
        {{ state_attr('climate.home', 'status')['system_mode_status']['mode'] }}
      icon: mdi:thermostat

    - name: "Hall d'entrée Temperature"
      unique_id: honeywell-1
      state: >-
        {{ states.climate.hall_entree.attributes['current_temperature'] | float }}
      unit_of_measurement: "°C"
      device_class: temperature

    - name: "WC Bas Temperature"
      unique_id: honeywell-2
      state: >-
        {{ states.climate.wc_bas.attributes['current_temperature'] | float }}
      unit_of_measurement: "°C"
