>
  {# Daily Briefing #}
  {%- macro getReport() -%}
    {% set months = ["Janvier", "Fevrier", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Decembre"] %}
    {% set days   = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"]  %}
    
    {% if now().strftime('%H')|int < 12 %}
    Bonjour.
    {% elif now().strftime('%H')|int >= 12 and now().strftime('%H')|int < 17 %}
    Bonne après-midi
    {% else %}
    Bonne soirée.
    {% endif %}        
    
    Nous sommes le {{ days[now().weekday()] + ' ' + now().day | string + ' ' + months[now().month-1] + ' ' + now().year |string }}
    Il est {{ now().hour}}:{{ '%02d' %now().minute}}      
  {%- endmacro -%}

  {%- macro getMeteo() -%}
    La température extérieure actuelle est de {{states.sensor.vicare_outside_temperature.state}}°  
    {% if is_state('sensor.daily_weather', 'unavailable') %}
      Les prévisions météo sont indisponibles.
    {% else %}
      {% set current_time = now().hour %}
      {% set day_labels = ["Aujourd'hui", "Demain"] if current_time < 20 else ["Demain", "Après-demain"] %}

      {% set condition_map = {
        'cloudy': 'Nuageux',
        'fog': 'Brumeux',
        'hail': 'Grêle',
        'lightning': 'Orageux',
        'lightning-rainy': 'Orageux avec pluie',
        'partlycloudy': 'Partiellement nuageux',
        'pouring': 'Fortes précipitations',
        'rainy': 'Pluvieux',
        'snowy': 'Neigeux',
        'snowy-rainy': 'Neigeux avec pluie',
        'sunny': 'Ensoleillé',
        'windy': 'Vent fort',
        'windy-variant': 'Vent fort'
      } %}

      {% for state in states.sensor.daily_weather.attributes.forecast %}
        {% if loop.index <= 2 %}
          {{ day_labels[loop.index - 1] }} le temps sera: 
          {{ condition_map.get(state.condition, state.condition) }}
          avec une température minimale de {{ state.templow }}° et une température maximale de {{ state.temperature }}°.
        {% endif %}
      {% endfor %}
    {% endif %}
  {%- endmacro -%}

  {%- macro getGaz() -%}
    Le niveau de la citerne de gaz est de {{states.sensor.antargaz.state}}%
  {%- endmacro -%}

  {%- macro getElectricity() -%}
    La production solaire attendue pour aujourd'hui est de {{states.sensor.energy_production_today.state}} {{states.sensor.energy_production_today.attributes.unit_of_measurement}}    
    La production réele d'aujourd'hui est de {{ (states ('sensor.sb5_0_1av_41_208_daily_yield')| float + states ('sensor.sb5_0_1av_41_345_daily_yield')|float) / 1000| float }} kWh    
    La consommation annuelle est de {{ states('sensor.net_energy') |round(1)}} {{state_attr ('sensor.net_energy','unit_of_measurement') }}
  {%- endmacro -%}

  {%- macro getTesla() -%}
    Le niveau de batterie de FRIDAY est de {{ states('sensor.f_r_i_d_a_y_niveau_de_batterie')}}{{state_attr ('sensor.f_r_i_d_a_y_niveau_de_batterie','unit_of_measurement') }}
  {%- endmacro -%}
  
  {# a macro that removes all newline characters, empty spaces, and returns formatted text  #}
  {%- macro cleanup(data) -%}
      {%- for item in data.split("\n")  if item | trim != "" -%}
        {{ item | trim }} 
      {% endfor -%}
  {%- endmacro -%}
  
  {# a macro to call all macros :)  #}
  {%- macro mother_of_all_macros() -%}
      {{ getReport() }}
      {{ getMeteo() }}
      {{ getGaz() }}
      {{ getElectricity() }}
      {{ getTesla() }}
  {%- endmacro -%}
    
  {# Call the macro  #}
  {{- cleanup(mother_of_all_macros()) -}}