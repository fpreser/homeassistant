start_aeration:
  alias: Start Aeration
  sequence:
  - service: timer.start
    data:
      duration: '{{ states (''input_datetime.velux_aeration_duration'') }}'
    target:
      entity_id: timer.velux
  mode: single
publish_mqtt_to_awtrix:
  alias: Publish MQTT To Awtrix
  sequence:
  - service: mqtt.publish
    data:
      qos: '0'
      retain: false
      topic: awtrix_dd33c0/notify
      payload: '{   "text": "Hello!",   "rainbow": true,   "duration": 5, "progress":
        "50" }'
  mode: single
prepare_google_sans_son:
  alias: Prépare google sans son
  sequence:
  - choose:
    - conditions:
      - condition: template
        value_template: is_state (' {{ media_player }} ','off')
      sequence:
      - service: media_player.volume_mute
        data:
          entity_id: '{{ media_player }} '
          is_volume_muted: true
      - service: media_player.turn_on
        data:
          entity_id: '{{ media_player }} '
      - wait_template: is_state (' {{ media_player }} ', 'idle')
    - conditions:
      - condition: template
        value_template: is_state (' {{ media_player }} ','idle')
      sequence:
      - service: media_player.volume_mute
        data:
          entity_id: '{{ media_player }} '
          is_volume_muted: true
    default:
    - service: media_player.volume_mute
      data:
        entity_id: '{{ media_player }} '
        is_volume_muted: true
    - service: media_player.play_media
      target:
        entity_id: '{{ media_player }} '
      data:
        media_content_id: media-source://media_source/local/halfsec_silence.mp3
        media_content_type: music
    - delay:
        hours: 0
        minutes: 0
        seconds: 0
        milliseconds: 800
    - service: media_player.volume_mute
      data:
        entity_id: '{{ media_player }} '
        is_volume_muted: false
  mode: single
chauffage_auto:
  alias: Chauffage automatique
  sequence:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ parameter == ''away'' }}'
      sequence:
      - data:
          entity_id: climate.bureau_fabien
          setpoint: 15
        action: evohome.set_zone_override
    - conditions:
      - condition: template
        value_template: '{{ parameter == ''home'' }}'
      sequence:
      - data:
          entity_id: climate.bureau_fabien
        action: evohome.clear_zone_override
  - action: evohome.refresh_system
    metadata: {}
    data: {}
restart_wifi:
  alias: Restart Wifi
  description: Power cycles WiFi satellites with a parameter for location (Bureau,
    Grenier, Router, or All)
  fields:
    satellite:
      name: Satellite
      description: Which satellite(s) to restart (Bureau, Grenier, Router, or All)
      required: true
      selector:
        select:
          options:
          - Bureau
          - Grenier
          - Router
          - All
  sequence:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ satellite == ''Bureau'' }}'
      sequence:
      - target:
          entity_id: switch.bureau_fabien_pc
        action: switch.turn_off
        data: {}
      - delay:
          minutes: 1
      - target:
          entity_id: switch.bureau_fabien_pc
        action: switch.turn_on
        data: {}
    - conditions:
      - condition: template
        value_template: '{{ satellite == ''Grenier'' }}'
      sequence:
      - target:
          entity_id: switch.prise_satellite_wifi_grenier
        action: switch.turn_off
        data: {}
      - delay:
          minutes: 1
      - target:
          entity_id: switch.prise_satellite_wifi_grenier
        action: switch.turn_on
        data: {}
    - conditions:
      - condition: template
        value_template: '{{ satellite == ''Router'' }}'
      sequence:
      - action: button.press
        target:
          entity_id: button.routeur_redemarrer
        data: {}
    - conditions:
      - condition: template
        value_template: '{{ satellite == ''All'' }}'
      sequence:
      - action: button.press
        target:
          entity_id: button.routeur_redemarrer
        data: {}
      - delay:
          minutes: 2
      - target:
          entity_id: switch.bureau_fabien_pc
        action: switch.turn_off
        data: {}
      - delay:
          minutes: 1
      - target:
          entity_id: switch.bureau_fabien_pc
        action: switch.turn_on
        data: {}
      - delay:
          minutes: 2
      - target:
          entity_id: switch.prise_satellite_wifi_grenier
        action: switch.turn_off
        data: {}
      - delay:
          minutes: 1
      - target:
          entity_id: switch.prise_satellite_wifi_grenier
        action: switch.turn_on
        data: {}
